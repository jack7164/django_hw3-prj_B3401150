<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧生活小幫手 V3 - 控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* 精緻的高質感漸層背景 */
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-vh-100: 100vh;
        }
        /* 任務已完成的刪除線與淡化效果 */
        .completed-text { 
            text-decoration: line-through; 
            color: #adb5bd; 
        }
        /* 列表項目的微動態懸浮效果 */
        .todo-item { 
            transition: all 0.25s ease; 
        }
        .todo-item:hover { 
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05) !important;
        }
        /* 膠囊帳戶標籤樣式 */
        .user-badge {
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-4 sticky-top">
    <div class="container">
        <a class="navbar-brand fw-extrabold fs-4 text-white" href="#">
            <i class="bi bi-check2-square text-info me-2"></i>生活小幫手 <span class="badge bg-info text-dark fs-6 align-middle">V3</span>
        </a>
        <div class="d-flex align-items-center">
            <span class="navbar-text text-white me-3 px-3 py-2 rounded-pill user-badge border border-secondary">
                <i class="bi bi-person-circle text-info me-2"></i>在線使用者：<strong class="text-warning">{{ request.user.username }}</strong>
            </span>
            <form action="{% url 'logout' %}" method="POST" class="m-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>登出系統
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container my-5" style="max-width: 800px;">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        
        <div class="bg-primary" style="height: 6px;"></div>

        <div class="card-body p-4 p-md-5 bg-white">
            
            <div class="d-flex align-items-center mb-4">
                <div class="bg-primary bg-opacity-10 p-3 rounded-3 me-3 text-primary">
                    <i class="bi bi-columns-gap fs-2"></i>
                </div>
                <div>
                    <h2 class="fw-black text-dark m-0">我的待辦事項</h2>
                    <p class="text-muted m-0 small">透過非同步 RESTful API 進行極速動態管理</p>
                </div>
            </div>

            <div class="card border border-light-subtle bg-light rounded-3 mb-5 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title text-secondary mb-3"><i class="bi bi-plus-circle-fill me-2"></i>建立新待辦事項</h5>
                    <form id="apiAddForm">
                        <div class="row g-3">
                            <div class="col-md-7">
                                <div class="form-floating">
                                    <input type="text" id="apiTitle" class="form-control border-secondary-subtle" placeholder="任務名稱" required>
                                    <label for="apiTitle"><i class="bi bi-pencil me-1"></i>任務名稱 (必填)</label>
                                </div>
                            </div>
                            <div class="col-md-5">
                                <div class="form-floating">
                                    <input type="datetime-local" id="apiDeadline" class="form-control border-secondary-subtle">
                                    <label for="apiDeadline"><i class="bi bi-calendar-event me-1"></i>設定截止日期</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" id="apiContent" class="form-control border-secondary-subtle" placeholder="詳細內容">
                                    <label for="apiContent"><i class="bi bi-file-text me-1"></i>詳細內容與備註說明 (選填)</label>
                                </div>
                            </div>
                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-primary px-4 py-2 rounded-3 shadow-sm fw-bold">
                                    <i class="bi bi-send-fill me-2"></i>發送
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <h5 class="text-dark fw-bold mb-3 d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-task me-2 text-primary"></i>任務清單明細</span>
            </h5>

            <div class="list-group list-group-flush border rounded-3 overflow-hidden shadow-sm" id="taskList">
                <div class="text-center py-5 text-muted" id="loadingMsg">
                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                    正在與安全雲端資料庫同步中...
                </div>
            </div>

            <div id="emptyMessage" class="text-center py-5 text-muted d-none bg-light rounded-3 border border-dashed mt-3">
                <i class="bi bi-emoji-smile fs-1 text-secondary mb-2 d-block"></i>
                <p class="fs-5 fw-medium mb-1 text-dark">太棒了！目前沒有任何未辦事項</p>
                <p class="small text-muted mb-0">您可以利用上方表單隨時指派全新任務</p>
            </div>

        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadTasks);

    // [API: GET] 讀取任務
    function loadTasks() {
        fetch('/api/todos/')
            .then(response => response.json())
            .then(data => {
                document.getElementById('loadingMsg').classList.add('d-none');
                const taskList = document.getElementById('taskList');
                taskList.innerHTML = ''; 

                if (data.data.length === 0) {
                    document.getElementById('emptyMessage').classList.remove('d-none');
                } else {
                    document.getElementById('emptyMessage').classList.add('d-none');
                    data.data.forEach(task => renderTaskHTML(task));
                }
            });
    }

    // [API: POST] 新增任務
    document.getElementById('apiAddForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const taskContentValue = document.getElementById('apiContent').value;
        const payload = {
            title: document.getElementById('apiTitle').value,
            content: taskContentValue,
            description: taskContentValue,
            memo: taskContentValue,
            content: document.getElementById('apiContent').value,
            deadline: document.getElementById('apiDeadline').value || null
        };

        fetch('/api/todos/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('apiAddForm').reset();
                document.getElementById('emptyMessage').classList.add('d-none');
                renderTaskHTML(data.data, true);
            } else {
                alert('驗證不通過：' + JSON.stringify(data.errors));
            }
        });
    });

    // [API: PATCH] 變更狀態
    function toggleTask(id, checkbox) {
        fetch(`/api/todos/${id}/`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ is_completed: checkbox.checked })
        })
        .then(response => response.json())
        .then(data => {
            const titleSpan = document.getElementById(`title-${id}`);
            const contentSpan = document.getElementById(`content-${id}`);
            if (data.data.is_completed) {
                titleSpan.classList.add('completed-text');
                if(contentSpan) contentSpan.classList.add('completed-text');
            } else {
                titleSpan.classList.remove('completed-text');
                if(contentSpan) contentSpan.classList.remove('completed-text');
            }
        });
    }

    // [API: DELETE] 刪除任務
    function deleteTask(id) {
        if (!confirm('確認要透過 RESTful API 徹底銷毀此項紀錄嗎？')) return;

        fetch(`/api/todos/${id}/`, {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById(`todo-${id}`).remove();
                if (document.querySelectorAll('.todo-item').length === 0) {
                    document.getElementById('emptyMessage').classList.remove('d-none');
                }
            }
        });
    }

    // 動態 HTML 注入元件 (套用全新 Bootstrap 樣式與 Icon)
    function renderTaskHTML(task, prepend = false) {
        const taskList = document.getElementById('taskList');
        const isChecked = task.is_completed ? 'checked' : '';
        const textClass = task.is_completed ? 'completed-text' : '';
        
        const taskContent = task.content || task.description || task.memo || '';
        
        // 處理截止日期顯示
        let deadlineHtml = '';
        if (task.deadline) {
            const d = new Date(task.deadline);
            const dateStr = d.toLocaleString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
            deadlineHtml = `<span class="badge bg-warning-subtle text-warning-tight align-self-start mt-2 px-2 py-1 border border-warning-subtle rounded text-dark" style="font-size: 0.75rem;"><i class="bi bi-clock me-1"></i>截止期限：${dateStr}</span>`;
        }
        //生成任務項目的 HTML 結構，包含 Bootstrap 樣式與 Icon
        const html = `
            <div class="list-group-item d-flex justify-content-between align-items-center p-3 todo-item border-bottom shadow-sm" id="todo-${task.id}">
                <div class="d-flex align-items-center flex-grow-1">
                    <input class="form-check-input me-3 border-secondary-subtle" type="checkbox" style="width: 1.4rem; height: 1.4rem; cursor: pointer;"
                        onchange="toggleTask(${task.id}, this)" ${isChecked}>

                        <!-- 任務標題與內容，已完成則套用刪除線與淡化效果 -->
                        <div class="d-flex flex-column">
                        <span class="fs-5 fw-bold text-dark ${textClass}" id="title-${task.id}">${task.title}</span>
                        ${task.content ? `<span class="text-muted mt-1 ${textClass}" id="content-${task.id}" style="font-size: 0.875rem;"></i>${task.content}</span>` : ''}
                        ${deadlineHtml}
                    </div>
                </div>
                
                <!-- 編輯與刪除按鈕，使用 Bootstrap 圖示並套用圓形按鈕樣式 -->
                <div class="d-flex align-items-center">
                    <a href="/edit/${task.id}/" class="btn btn-sm btn-outline-primary btn-icon me-2 rounded-circle" title="編輯細節" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <button type="button" class="btn btn-sm btn-outline-danger rounded-circle" onclick="deleteTask(${task.id})" title="刪除任務" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-trash3"></i>
                    </button>
                </div>
            </div>
        `;
        
        if (prepend) {
            taskList.insertAdjacentHTML('afterbegin', html);
        } else {
            taskList.insertAdjacentHTML('beforeend', html);
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
