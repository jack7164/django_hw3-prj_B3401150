<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>會員登入 - 生活清單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow" style="width: 400px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4 fw-bold text-primary">系統登入</h3>
            
            {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                    帳號或密碼錯誤，請重新輸入。
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">帳號 (Username)</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">密碼 (Password)</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">登入</button>
                <div class="text-center">
                    <span class="text-muted">還沒有帳號嗎？</span>
                    <a href="{% url 'register' %}" class="text-decoration-none fw-bold">立即註冊</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
