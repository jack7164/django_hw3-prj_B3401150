<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>會員註冊 - 生活清單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow" style="width: 450px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4 fw-bold text-success">建立新帳號</h3>
            
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" class="form-control" required>
                        {% if field.help_text %}
                            <div class="form-text style="font-size: 0.8rem;">{{ field.help_text }}</div>
                        {% endif %}
                        {% for error in field.errors %}
                            <div class="text-danger mt-1 fw-bold" style="font-size: 0.85rem;">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-success w-100 mb-3 mt-2">完成註冊並登入</button>
                <div class="text-center">
                    <span class="text-muted">已經有帳號了？</span>
                    <a href="{% url 'login' %}" class="text-decoration-none fw-bold">直接登入</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
