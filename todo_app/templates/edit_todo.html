<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>編輯待辦事項</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">修改事項內容</h3>
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="{{ form.title.id_for_label }}" class="form-label">待辦事務名稱</label>
                        {{ form.title }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.content.id_for_label }}" class="form-label">詳細內容</label>
                        {{ form.content }}
                    </div>
                    
                    <div class="mb-4">
                        <label for="{{ form.deadline.id_for_label }}" class="form-label">截止時間</label>
                        {{ form.deadline }}
                        {% if form.deadline.errors %}
                            <div class="text-danger mt-1 fw-bold">
                                {{ form.deadline.errors|striptags }}
                            </div>
                        {% endif %}
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'todo_page' %}" class="btn btn-outline-secondary">取消並返回</a>
                        <button type="submit" class="btn btn-primary">儲存修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
